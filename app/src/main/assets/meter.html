<body class="bg-surface font-body-lg text-on-surface" style="margin: 0; padding: 0; min-height: 100vh;">
<!-- Main Instrument Canvas -->
<main class="grid-mesh" style="padding: 0 16px 16px 16px; margin: 0; margin-top: -8px;">
<div class="max-w-4xl mx-auto" style="padding: 0; margin: 0; margin-top: -8px;">

<!-- ECharts Gauge -->
<div id="gaugeChart" style="width: 100%; height: 300px; margin: 0; padding: 0; margin-top: -16px;"></div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
// Initialize ECharts
const chartDom = document.getElementById('gaugeChart');
const myChart = echarts.init(chartDom);

// Official gauge-grade example from https://echarts.apache.org/examples/en/editor.html?c=gauge-grade
const option = {
  grid: {
    top: 0,
    bottom: 0
  },
  series: [
    {
      type: 'gauge',
      startAngle: 180,
      endAngle: 0,
      center: ['50%', '85%'],
      radius: '110%',
      min: 0,
      max: 1,
      splitNumber: 12,
      axisLine: {
        lineStyle: {
          width: 6,
          color: [
            [0.25, '#58D9F9'],
            [0.5, '#7CFFB2'],
            [0.75, '#FDDD60'],
            [1, '#FF6E76']
          ]
        }
      },
      pointer: {
        icon: 'path://M12.8,0.7l12,40.1H0.7L12.8,0.7z',
        length: '12%',
        width: 20,
        offsetCenter: [0, '-60%'],
        itemStyle: {
          color: 'auto'
        }
      },
      axisTick: {
        length: 12,
        lineStyle: {
          color: 'auto',
          width: 2
        }
      },
      splitLine: {
        length: 20,
        lineStyle: {
          color: 'auto',
          width: 5
        }
      },
      axisLabel: {
        color: '#464646',
        fontSize: 20,
        distance: -60,
        rotate: 'tangential',
        formatter: function (value) {
          if (value === 0.875) {
            return 'Grade A';
          } else if (value === 0.625) {
            return 'Grade B';
          } else if (value === 0.375) {
            return 'Grade C';
          } else if (value === 0.125) {
            return 'Grade D';
          }
          return '';
        }
      },
      title: {
        offsetCenter: [0, '-10%'],
        fontSize: 20
      },
      detail: {
        fontSize: 64,
        offsetCenter: [0, '-25%'],
        valueAnimation: true,
        formatter: function (value) {
          return (value * 120).toFixed(1);
        },
        color: 'inherit',
        fontFamily: 'Space Grotesk',
        fontWeight: 700
      },
      data: [
        {
          value: 0.8,
          name: ''
        }
      ]
    }
  ]
};

myChart.setOption(option);

// Remove automatic updates - will be updated from Android
// Handle window resize
window.addEventListener('resize', function() {
    myChart.resize();
});
</script>

<!-- Noise Level Description -->
<div style="margin-top: 8px; margin-bottom: 12px;">
<p id="noiseLevelText" class="font-headline-md text-headline-md text-primary-container text-center"></p>
</div>

<!-- Secondary Metrics Bento Grid -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4" style="margin-bottom: 12px;">
<div class="bg-[#1A1A1A] border border-[#333333] p-3">
<p class="font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">MAX PEAK</p>
<p id="maxPeakValue" class="font-data-display text-data-display text-primary-container">0.0 dB</p>
</div>
<div class="bg-[#1A1A1A] border border-[#333333] p-3">
<p class="font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">MIN LEVEL</p>
<p id="minLevelValue" class="font-data-display text-data-display text-primary-container">0.0 dB</p>
</div>
</div>

<section class="bg-[#0A0A0A] border border-[#333333] overflow-hidden relative" style="margin-top: 0;">
<div id="lineChart" style="width: 100%; height: 150px;"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
// Initialize line chart
const lineChartDom = document.getElementById('lineChart');
const lineChart = echarts.init(lineChartDom);

// Generate random dB data for 60 seconds
const timeList = [];
const dbList = [];
for (let i = 0; i < 60; i++) {
  timeList.push(i + 's');
  dbList.push(Math.floor(Math.random() * 50 + 40)); // Random dB between 40-90
}

const lineOption = {
  backgroundColor: 'transparent',
  grid: {
    left: '60px',
    right: '20px',
    top: '10px',
    bottom: '30px'
  },
  visualMap: {
    show: false,
    type: 'continuous',
    seriesIndex: 0,
    min: 0,
    max: 120
  },
  tooltip: {
    trigger: 'axis',
    formatter: '{b}: {c} dB'
  },
  xAxis: {
    type: 'category',
    data: timeList,
    axisLabel: {
      color: '#666666',
      interval: 9 // Show every 10 seconds
    },
    axisLine: {
      lineStyle: {
        color: '#333333'
      }
    }
  },
  yAxis: {
    type: 'value',
    min: 0,
    max: 120,
    interval: 10,
    axisLabel: {
      color: '#666666',
      formatter: function(value) {
        if (value === 0 || value === 40 || value === 80 || value === 120) {
          return value + ' dB';
        }
        return '';
      }
    },
    splitLine: {
      lineStyle: {
        color: '#333333'
      }
    },
    axisLine: {
      lineStyle: {
        color: '#333333'
      }
    }
  },
  series: [
    {
      type: 'line',
      showSymbol: false,
      data: dbList,
      smooth: true,
      lineStyle: {
        width: 2
      }
    }
  ]
};

lineChart.setOption(lineOption);

// Function to update line chart from Android
function updateLineChart(db) {
  // Shift data
  timeList.shift();
  dbList.shift();

  // Add new data point
  const newTime = parseInt(timeList[timeList.length - 1]) + 1;
  timeList.push(newTime + 's');
  dbList.push(Math.floor(db));

  lineChart.setOption({
    xAxis: {
      data: timeList
    },
    series: [{
      data: dbList
    }]
  });
}

// Function to set noise level text from Android (already localized)
function setNoiseLevelText(text) {
  const noiseLevelElement = document.getElementById('noiseLevelText');
  if (noiseLevelElement) noiseLevelElement.textContent = text;
}

// Function to update max peak from Android
function updateMaxPeak(db) {
  const maxPeakElement = document.getElementById('maxPeakValue');
  maxPeakElement.textContent = db.toFixed(1) + ' dB';
}

// Function to update min level from Android
function updateMinLevel(db) {
  const minLevelElement = document.getElementById('minLevelValue');
  minLevelElement.textContent = db.toFixed(1) + ' dB';
}

// Function to apply accent color from Android
function setAccentColor(hex) {
  ['noiseLevelText', 'maxPeakValue', 'minLevelValue'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.style.color = hex;
  });
  if (typeof option !== 'undefined' && typeof myChart !== 'undefined') {
    option.series[0].detail.color = hex;
    myChart.setOption(option);
  }
}

// Handle window resize
window.addEventListener('resize', function() {
    lineChart.resize();
});
</script>

</div>
</main>
</body></html>
